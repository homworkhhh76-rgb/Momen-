const APP_KEY='supermarket_pos_ar_v1';
const FIREBASE_LOGIN_KEY='cashier_units_pro_momen_1d40d_885766842';
const DEFAULT_MANAGER_PASSWORD='0000000000@@';
const LEGACY_COMPANY_KEYS=new Set();
function cleanText(v){return String(v??'').trim()}
function cleanCompanyKey(v){const s=cleanText(v||FIREBASE_LOGIN_KEY).replace(/[^a-zA-Z0-9_-]/g,'_');return (!s||s!==FIREBASE_LOGIN_KEY)?FIREBASE_LOGIN_KEY:s}
function readStoredDB(){try{return JSON.parse(localStorage.getItem(APP_KEY)||'{}')||{}}catch(e){return {}}}
function writeStoredDB(db){localStorage.setItem(APP_KEY,JSON.stringify(db||{}));window.DB=db;return db}
function loadDB(){
  let db=readStoredDB();
  db.settings={storeName:'كاشير أوسكار',managerPassword:DEFAULT_MANAGER_PASSWORD,companyKey:FIREBASE_LOGIN_KEY,currency:'₪',forcePasswordChange:true,...(db.settings||{})};
  db.settings.companyKey=cleanCompanyKey(db.settings.companyKey);
  if(!db.settings.managerPassword) db.settings.managerPassword=DEFAULT_MANAGER_PASSWORD;
  if(db.settings.managerPassword===DEFAULT_MANAGER_PASSWORD) db.settings.forcePasswordChange=true;
  db.employees=Array.isArray(db.employees)?db.employees:[];
  if(!db.employees.some(e=>String(e.id)==='manager')){
    db.employees.unshift({id:'manager',name:'مدير النظام',username:'manager',email:'',password:'',role:'مدير',permissions:['*'],active:'نشط'});
  }
  db.employees=db.employees.map(e=>{
    e={...e};
    if(String(e.id)==='manager'||String(e.username||'').toLowerCase()==='admin'){
      if(e.password===DEFAULT_MANAGER_PASSWORD) e.password='';
      if(e.role==='Admin') e.role='مدير';
      e.permissions=Array.isArray(e.permissions)?e.permissions:['*'];
    }
    return e;
  });
  db.accounts=Array.isArray(db.accounts)&&db.accounts.length?db.accounts:[{id:'cash-main',name:'الصندوق الرئيسي',code:'1001',type:'الأصول المتداولة',balance:0,openingBalance:0,active:'نشط'}];
  return writeStoredDB(db);
}
let DB=loadDB();
document.getElementById('companyKey').value=DB.settings.companyKey||FIREBASE_LOGIN_KEY;
function toast(m){let t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2600)}
function setRole(r){document.getElementById('role').value=r;document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));document.getElementById('btn-'+r).classList.add('active');document.getElementById('hint').textContent=r==='manager'?'دخول المدير يحتاج مفتاح فايربيز وكلمة المرور.':'دخول الموظف باسم المستخدم أو البريد وكلمة المرور.';document.getElementById('usernameWrap').style.display=r==='employee'?'block':'none';document.getElementById('companyWrap').style.display=r==='manager'?'block':'none'}
async function pullForLogin(key){
  key=cleanCompanyKey(key);
  DB=loadDB(); DB.settings.companyKey=key; writeStoredDB(DB);
  if(window.FirebaseBridge&&navigator.onLine){try{await window.FirebaseBridge.pullWithKey(key);DB=loadDB();DB.settings.companyKey=key;writeStoredDB(DB)}catch(e){console.warn('login pull skipped',e)}}
  return DB;
}
async function saveNewManagerPassword(pass,key){
  const p=cleanText(pass);
  if(!p||p.length<6||p===DEFAULT_MANAGER_PASSWORD){toast('كلمة المرور الجديدة غير صالحة');return false}
  DB=loadDB();
  DB.settings.managerPassword=p;
  DB.settings.forcePasswordChange=false;
  DB.settings.companyKey=cleanCompanyKey(key);
  DB.settings._updatedAt=new Date().toISOString();
  DB.lastLocalUpdate=DB.settings._updatedAt;
  writeStoredDB(DB);
  if(window.FirebaseBridge&&navigator.onLine){
    try{await window.FirebaseBridge.updateManagerPassword(p,DB.settings.companyKey)}
    catch(e){console.warn(e);try{await window.FirebaseBridge.pushWithKey(DB.settings.companyKey)}catch(_e){console.warn(_e)}}
  }
  toast('تم تغيير كلمة مرور المدير وحفظها');
  return true;
}
async function login(){
  const role=document.getElementById('role').value;
  const pass=cleanText(document.getElementById('password').value);
  const user=cleanText(document.getElementById('username').value);
  const key=cleanCompanyKey(document.getElementById('companyKey').value||FIREBASE_LOGIN_KEY);
  await pullForLogin(key);
  if(role==='manager'){
    if(key!==cleanCompanyKey(DB.settings.companyKey)) return toast('مفتاح فايربيز غير صحيح');
    const savedPass=cleanText(DB.settings.managerPassword||DEFAULT_MANAGER_PASSWORD);
    if(pass!==savedPass) return toast('كلمة مرور المدير غير صحيحة');
    if(savedPass===DEFAULT_MANAGER_PASSWORD||DB.settings.forcePasswordChange){
      const p=prompt('يجب تغيير كلمة مرور المدير الآن. اكتب كلمة مرور جديدة:');
      if(!(await saveNewManagerPassword(p,key))) return;
    }
    localStorage.setItem('currentUser',JSON.stringify({id:'manager',name:'مدير النظام',username:'manager',role:'مدير',permissions:['*'],active:'نشط',companyKey:key,managerId:'manager',isManager:true}));
    location.href='لوحة-المتابعة.html';
    return;
  }
  if(pass===DEFAULT_MANAGER_PASSWORD) return toast('كلمة المرور الافتراضية مخصصة لدخول المدير أول مرة فقط');
  const norm=s=>cleanText(s).toLowerCase();
  const emp=(DB.employees||[]).find(e=>{
    const isActive=norm(e.active||'نشط')!=='غير نشط'&&!e._deleted;
    const matched=[e.username,e.email,e.name,e.phone,e.mobile].map(norm).includes(norm(user));
    const empPass=cleanText(e.password||e.pass||e.pin);
    const isManagerAccount=String(e.id)==='manager'||norm(e.role)==='admin'||norm(e.role)==='مدير';
    return isActive&&matched&&empPass&&empPass===pass&&!(isManagerAccount&&pass===DEFAULT_MANAGER_PASSWORD);
  });
  if(emp){localStorage.setItem('currentUser',JSON.stringify({...emp,companyKey:key,permissions:Array.isArray(emp.permissions)?emp.permissions:[]}));location.href='لوحة-المتابعة.html';return}
  toast('بيانات الموظف غير صحيحة أو الحساب غير نشط');
}

  function patchAccounting(){const title=accountingPage(); if(!title)return; document.body.classList.add('oskar-accounting-en'); document.title=title+' - Oskar Cashier'; if(window.CFG){CFG.title=title; CFG.menu='Accounting';} normalizeAccounts(); const h=$('.title-row h1'); if(h)h.textContent=title; $$('a[href="إدارة-الحسابات.html"]').forEach(a=>a.textContent='Accounts'); $$('a[href="سجل-الحسابات.html"]').forEach(a=>a.textContent='Account Ledger'); $$('a[href="تقرير-الحسابات.html"]').forEach(a=>a.textContent='Accounts Report'); $$('a[href="تحويل-مالي.html"]').forEach(a=>a.textContent='Money Transfer'); $$('.menu-head b').forEach(b=>{if(/إدارة الحسابات|الحسابات/.test(b.textContent))b.textContent='Accounting'});
    window.renderAccounts=function(){normalizeAccounts(); const rows=accountRows(); const total=rows.reduce((s,a)=>s+Number(a.balance||0),0); const main=document.getElementById('mainCard'); if(!main)return; main.innerHTML='<div class="table-toolbar"><div class="tools"><button class="btn primary" onclick="openAccountForm()">+ Add Account</button><input id="searchBox" class="search" placeholder="Search..." oninput="renderAccounts()"></div><div class="tools"><button class="btn ghost small" onclick="exportCSV()">Export CSV</button><button class="btn ghost small" onclick="window.print()">Print</button></div></div><div class="table-wrap"><table class="data-table"><thead><tr><th>Account Name</th><th>Account Type</th><th>Account No.</th><th>Balance</th><th>Note</th><th>Created By</th><th>Actions</th></tr></thead><tbody>'+rows.map(a=>'<tr><td><b>'+e(tr(a.name))+'</b><br><span class="status '+((a.active==='Inactive'||a.active==='غير نشط')?'bad':'ok')+'">'+e(tr(a.active||'Active'))+'</span></td><td>'+e(tr(a.type))+'</td><td>'+e(a.code||'')+'</td><td>'+moneyFn(a.balance)+'</td><td>'+e(tr(a.note))+'</td><td>'+e(a.createdBy||'')+'</td><td>'+accountingActions(a.id)+'</td></tr>').join('')+'</tbody><tfoot><tr><td colspan="3">Total</td><td>'+moneyFn(total)+'</td><td colspan="3"></td></tr></tfoot></table></div>'; modernizeFields(main);};
    window.openAccountForm=function(id=''){normalizeAccounts(); const a=accountBy(id); const modal=document.getElementById('modalBack'), titleEl=document.getElementById('modalTitle'), body=document.getElementById('modalBody'); if(!body||!modal)return; if(titleEl)titleEl.textContent=id?'Edit Account':'Add New Account'; body.innerHTML='<form id="accForm" class="grid"><input type="hidden" name="id" value="'+e(id)+'"><div class="field"><label>Account Name</label><input name="name" value="'+e(tr(a.name))+'" required></div><div class="field"><label>Account No.</label><input name="code" value="'+e(a.code||'')+'"></div><div class="field"><label>Account Type</label><select name="type">'+['Current Assets','Current Liabilities','Equity','Expenses','Revenue'].map(x=>'<option '+(tr(a.type)===x?'selected':'')+'>'+x+'</option>').join('')+'</select></div><div class="field"><label>Opening Balance</label><input name="openingBalance" type="number" value="'+e(a.openingBalance||0)+'"></div><div class="field"><label>Status</label><select name="active"><option '+(tr(a.active)==='Active'?'selected':'')+'>Active</option><option '+(tr(a.active)==='Inactive'?'selected':'')+'>Inactive</option></select></div><div class="field" style="grid-column:1/-1"><label>Note</label><textarea name="note">'+e(tr(a.note))+'</textarea></div></form>'; modal.style.display='flex'; setTimeout(()=>modernizeFields(modal),0)};
    const oldSave=window.saveAccount; window.saveAccount=function(){const f=document.getElementById('accForm'); if(!f)return oldSave&&oldSave(); let data=Object.fromEntries(new FormData(f).entries()); try{let rows=collection('accounts'); if(data.id){let i=rows.findIndex(x=>x.id===data.id); if(i>=0)rows[i]={...rows[i],...data,balance:Number(rows[i].balance||0)};}else{data.id=(window.uid?uid('acc'):'acc-'+Date.now()); data.balance=Number(data.openingBalance||0); data.createdBy=(window.currentUser?currentUser().name:'Admin'); rows.unshift(data); if(data.balance&&window.addMovement)addMovement(data.id,'in',data.balance,'Opening Balance','Account Created');} if(window.persist)persist(); if(window.closeModal)closeModal(); if(window.renderAccounts)renderAccounts(); if(window.toast)toast('Account saved');}catch(err){console.warn(err)}};
    window.quickMovement=function(accountId,type){let amount=Number(prompt(type==='in'?'Deposit amount':'Withdrawal amount')||0); if(amount>0){if(window.addMovement)addMovement(accountId,type,amount,type==='in'?'Manual Deposit':'Manual Withdrawal','Account Management'); if(window.persist)persist(); if(window.renderAccounts)renderAccounts();}};
    window.renderTransfer=function(){normalizeAccounts(); const main=document.getElementById('mainCard'); if(!main)return; main.innerHTML='<div class="grid"><div class="field"><label>From Account</label><select id="fromAccount">'+accountOptions()+'</select></div><div class="field"><label>To Account</label><select id="toAccount">'+accountOptions()+'</select></div><div class="field"><label>Amount</label><input id="amount" type="number"></div><div class="field"><label>Note</label><input id="note"></div></div><div class="tools" style="justify-content:center;margin-top:14px"><button class="btn purple" onclick="saveTransfer()">Save Transfer</button></div>'; modernizeFields(main)};
    window.saveTransfer=function(){let from=document.getElementById('fromAccount')?.value,to=document.getElementById('toAccount')?.value,amount=Number(document.getElementById('amount')?.value||0); if(!from||!to||!amount)return window.toast&&toast('Complete the transfer data'); if(window.addMovement){addMovement(from,'out',amount,'Transfer',document.getElementById('note')?.value||'');addMovement(to,'in',amount,'Transfer',document.getElementById('note')?.value||'')} try{collection('accountTransfers').unshift({id:window.uid?uid('tr'):'tr-'+Date.now(),date:window.nowText?nowText():new Date().toISOString(),fromAccount:tr(accountBy(from).name),toAccount:tr(accountBy(to).name),amount,note:document.getElementById('note')?.value||'',createdBy:window.currentUser?currentUser().name:'Admin'}); if(window.persist)persist(); if(window.toast)toast('Transfer saved'); renderTransfer();}catch(err){console.warn(err)}};
    window.renderAccountsEnglishReport=function(){const rows=(window.collection?collection('accountMovements'):[]).filter(x=>!x._deleted); const main=document.getElementById('mainCard'); if(!main)return; const cols=['date','accountName','type','amount','balanceBefore','balanceAfter','source','note','createdBy']; const heads=['Date','Account','Type','Amount','Balance Before','Balance After','Source','Note','Created By']; main.innerHTML='<div class="table-toolbar"><div class="tools"><input id="searchBox" class="search" placeholder="Search..." oninput="renderAccountsEnglishReport()"></div><div class="tools"><button class="btn ghost small" onclick="exportCSV&&exportCSV()">Export CSV</button><button class="btn ghost small" onclick="window.print()">Print</button></div></div><div class="table-wrap"><table class="data-table"><thead><tr>'+heads.map(h=>'<th>'+h+'</th>').join('')+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+cols.map(c=>{let v=r[c]; if(['amount','balanceBefore','balanceAfter'].includes(c))v=moneyFn(v); else v=tr(v); return '<td>'+e(v)+'</td>'}).join('')+'</tr>').join('')+'</tbody></table></div>'; modernizeFields(main)};
    const oldReports=window.renderReportsGeneric; window.renderReportsGeneric=function(){if(window.CFG&&(CFG.kind==='accounts_report'||CFG.collection==='accountMovements'))return renderAccountsEnglishReport(); return oldReports&&oldReports.apply(this,arguments)};
    if(!document.body.dataset.r25AccountingRendered){document.body.dataset.r25AccountingRendered='1'; setTimeout(()=>{try{if(window.CFG&&CFG.kind==='accounts')renderAccounts(); else if(window.CFG&&CFG.kind==='transfer')renderTransfer(); else if(window.CFG&&(CFG.kind==='accounts_report'||CFG.collection==='accountMovements'))renderAccountsEnglishReport();}catch(err){console.warn(err)}},0);}
  }
  const oldRender=window.renderPage; if(oldRender&&!oldRender.__r25){window.renderPage=function(){const r=oldRender.apply(this,arguments); setTimeout(run,0); return r}; window.renderPage.__r25=true;}
  function run(){patchSyncNow(); updateSyncBadge(); modernizeFields(); polishInvoiceButtons(); patchAccounting();}
  document.addEventListener('click',function(ev){const b=ev.target.closest('[data-r19-inv]'); if(!b)return; const act=b.dataset.r19Inv,id=b.dataset.id; if(act==='image'&&window.downloadInvoiceImage)return downloadInvoiceImage(id); if(act==='delete'&&window.deleteInvoice)return deleteInvoice(id); if(act==='edit'&&window.editInvoice)return editInvoice(id);},true);
  const mo=new MutationObserver(()=>{clearTimeout(window.__r25tick); window.__r25tick=setTimeout(run,70)});
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',()=>{run(); try{mo.observe(document.documentElement,{childList:true,subtree:true})}catch(_){}}); else {run(); try{mo.observe(document.documentElement,{childList:true,subtree:true})}catch(_){}}
  [120,500,1200,2500].forEach(t=>setTimeout(run,t));
})();
</script>
