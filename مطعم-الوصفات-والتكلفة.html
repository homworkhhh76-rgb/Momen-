<script>
const APP_KEY='supermarket_pos_ar_v1';
const PAGE_KIND=window.REST_PAGE_KIND||'tables';
const PAGE_TITLE=window.REST_PAGE_TITLE||'المطعم';
const CURRENCY_FALLBACK='₪';
const STATUS={new:'جديد',preparing:'قيد التحضير',ready:'تم التحضير',onway:'في الطريق للطاولة',delivered:'تم التسليم',cancelled:'ملغي'};
const PAY={unpaid:'لم يحاسب',partial:'جزئي',paid:'مدفوع'};
function uid(p='id'){return p+'-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,8)}
function readDB(){try{return JSON.parse(localStorage.getItem(APP_KEY)||'{}')||{}}catch(e){return {}}}
function saveDB(db){localStorage.setItem(APP_KEY,JSON.stringify(db||{}));}
let DB=readDB();
function col(k){if(!Array.isArray(DB[k]))DB[k]=[];return DB[k]}
function settings(){DB.settings=DB.settings||{};return DB.settings}
function money(n){return (Number(n||0)).toFixed(2)+' '+(settings().currency||CURRENCY_FALLBACK)}
function today(){return new Date().toISOString().slice(0,10)}
function now(){return new Date().toLocaleString('ar-EG',{hour12:false})}
function safe(v){return String(v??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function toast(msg){let t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2600)}
function syncLight(){saveDB(DB); if(window.FirebaseBridge&&navigator.onLine){clearTimeout(window.__restSyncTimer);window.__restSyncTimer=setTimeout(async()=>{try{DB=await window.FirebaseBridge.sync(DB,{companyKey:settings().companyKey});saveDB(DB)}catch(e){console.warn(e)}},350)}}
async function pullLight(){if(window.FirebaseBridge&&navigator.onLine){try{DB=await window.FirebaseBridge.sync(readDB(),{companyKey:settings().companyKey});saveDB(DB);render()}catch(e){console.warn(e)}}}
function ensureRestaurant(){
  settings().restaurantMode=settings().restaurantMode||'off';
  settings().currency=settings().currency||CURRENCY_FALLBACK;
  if(!col('accounts').length)col('accounts').push({id:'cash-main',name:'الصندوق الرئيسي',code:'1001',type:'الأصول المتداولة',balance:0,openingBalance:0,active:'نشط'});
  if(!col('restaurantTables').length){for(let i=1;i<=10;i++)col('restaurantTables').push({id:'tbl-'+i,name:'طاولة '+i,seats:i<=4?4:6,status:'متاحة',currentOrderId:'',createdAt:new Date().toISOString()});}
  if(!col('restaurantMenu').length){col('restaurantMenu').push(
    {id:'dish-1',name:'وجبة برجر كلاسيك',category:'وجبات',price:28,active:'نشط',image:'',desc:'برجر مع خضار وصوص خاص',extras:'جبنة إضافية:3\nبطاطا:6',removes:'بدون بصل\nبدون مخلل',recipe:[{productName:'خبز برجر',qty:1,unit:'قطعة',costOverride:1.5},{productName:'لحم',qty:.15,unit:'كجم',costOverride:8},{productName:'خضار وصوص',qty:1,unit:'حصة',costOverride:2}]},
    {id:'dish-2',name:'بيتزا مارجريتا',category:'بيتزا',price:42,active:'نشط',image:'',desc:'جبنة موزاريلا وصلصة طماطم',extras:'جبنة إضافية:5\nأطراف جبنة:8',removes:'بدون زيتون\nبدون فلفل',recipe:[{productName:'طحين',qty:.2,unit:'كجم',costOverride:1.2},{productName:'جبنة',qty:.12,unit:'كجم',costOverride:6},{productName:'صلصة',qty:.08,unit:'كجم',costOverride:1.5}]},
    {id:'dish-3',name:'شاورما دجاج',category:'ساندوتشات',price:18,active:'نشط',image:'',desc:'دجاج متبل مع خبز وصوص',extras:'جبنة:3\nمخلل إضافي:2',removes:'بدون ثوم\nبدون سلطة',recipe:[{productName:'دجاج',qty:.15,unit:'كجم',costOverride:5.5},{productName:'خبز',qty:1,unit:'قطعة',costOverride:1},{productName:'صوص',qty:1,unit:'حصة',costOverride:0.8}]}
  );}
  ['restaurantProducts','restaurantOrders','restaurantSales','restaurantExpenses','restaurantReservations','restaurantWastage','restaurantPayments','restaurantInventoryMovements','restaurantLoyalty','restaurantCategories'].forEach(col);
  if(!col('restaurantProducts').length){col('restaurantProducts').push({id:'rprd-1',name:'خبز برجر',unit:'قطعة',stock:100,purchasePrice:1.5,reorderPoint:20,source:'restaurant'},{id:'rprd-2',name:'لحم',unit:'كجم',stock:25,purchasePrice:53.33,reorderPoint:5,source:'restaurant'},{id:'rprd-3',name:'طحين',unit:'كجم',stock:50,purchasePrice:6,reorderPoint:10,source:'restaurant'},{id:'rprd-4',name:'جبنة',unit:'كجم',stock:20,purchasePrice:50,reorderPoint:4,source:'restaurant'},{id:'rprd-5',name:'دجاج',unit:'كجم',stock:30,purchasePrice:36.66,reorderPoint:6,source:'restaurant'});}
  saveDB(DB);
}
ensureRestaurant();
function refreshDB(){DB=readDB();ensureRestaurant();}
function icon(name){const icons={cashier:'<svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M8 8h8M8 12h8M8 16h3"/><path d="M16 16h.01"/></svg>',tables:'<svg viewBox="0 0 24 24"><path d="M4 10h16"/><path d="M5 10l2 10M19 10l-2 10"/><path d="M8 4h8l2 6H6z"/></svg>',kitchen:'<svg viewBox="0 0 24 24"><path d="M6 3v8"/><path d="M10 3v8"/><path d="M8 3v18"/><path d="M14 3h4v18"/></svg>',menu:'<svg viewBox="0 0 24 24"><path d="M4 5h16M4 12h16M4 19h16"/><path d="M8 5v14"/></svg>',recipes:'<svg viewBox="0 0 24 24"><path d="M6 3h12v18H6z"/><path d="M9 7h6M9 11h6M9 15h4"/></svg>',inventory:'<svg viewBox="0 0 24 24"><path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/></svg>',reservations:'<svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M8 3v4M16 3v4M4 11h16"/></svg>',analytics:'<svg viewBox="0 0 24 24"><path d="M4 19V5"/><path d="M4 19h16"/><rect x="7" y="11" width="3" height="5"/><rect x="12" y="8" width="3" height="8"/><rect x="17" y="4" width="3" height="12"/></svg>'};return icons[name]||icons.tables}
function navHTML(){let pages=[['مطعم-الطاولات.html','tables','الطاولات'],['مطعم-المطبخ.html','kitchen','المطبخ KDS'],['مطعم-المنيو-الرقمي.html','menu','المنيو الرقمي'],['مطعم-كاشير-المطعم.html','cashier','كاشير المطعم'],['مطعم-الوصفات-والتكلفة.html','recipes','الوصفات والتكلفة'],['مطعم-مخزون-المطعم.html','inventory','مخزون المطعم'],['مطعم-الحجوزات.html','reservations','الحجوزات'],['مطعم-تحليلات-الأرباح.html','analytics','الأرباح والتحليلات']];let curr=decodeURIComponent(location.pathname.split('/').pop());return pages.map(p=>`<a class="${curr===p[0]?'active':''}" href="${p[0]}">${icon(p[1])}<span>${p[2]}</span></a>`).join('')+`<a href="لوحة-المتابعة.html">${icon('analytics')}<span>العودة للنظام</span></a>`}
function baseURL(){let href=location.href.split('#')[0].split('?')[0];return href.substring(0,href.lastIndexOf('/')+1)}
function tableLink(t){return baseURL()+'مطعم-المنيو-الرقمي.html?table='+encodeURIComponent(t.id)}
function qrURL(t){return 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data='+encodeURIComponent(tableLink(t))}
function tableById(id){return col('restaurantTables').find(t=>t.id===id)}
function dishById(id){return col('restaurantMenu').find(d=>d.id===id)}
function orderById(id){return col('restaurantOrders').find(o=>o.id===id)}
function productByIngredient(ing){let products=col('restaurantProducts');return products.find(p=>p.id&&p.id===ing.productId)||products.find(p=>String(p.name||'').trim()===String(ing.productName||'').trim())}
function num(x){return Number(x||0)||0}
function prodCost(p){return num(p?.purchasePrice||p?.costPrice||p?.cost||p?.buyPrice||p?.unitCost||p?.pricePurchase||0)}
function prodStock(p){return num(p?.stock ?? p?.currentStock ?? p?.quantity ?? p?.qty ?? p?.baseQty ?? 0)}
function setProdStock(p,v){if('stock' in p || !('currentStock' in p)){p.stock=Number(v.toFixed(3))}else p.currentStock=Number(v.toFixed(3));}
function ingredientCost(ing){let p=productByIngredient(ing);let cost=prodCost(p)||num(ing.costOverride);return cost*num(ing.qty)}
function dishCost(d){return (d.recipe||[]).reduce((s,ing)=>s+ingredientCost(ing),0)}
function orderCost(o){return (o.items||[]).reduce((s,it)=>s+dishCost(dishById(it.menuId)||{})*num(it.qty),0)}
function orderTotal(o){return (o.items||[]).reduce((s,it)=>s+num(it.total),0)}
function badge(text,type='dark'){return `<span class="badge ${type}">${text}</span>`}
function statusBadge(s){let type={new:'info',preparing:'warn',ready:'ok',onway:'info',delivered:'dark',cancelled:'bad'}[s]||'dark';return badge(STATUS[s]||s,type)}
function payBadge(s){let type={paid:'ok',partial:'warn',unpaid:'bad'}[s]||'dark';return badge(PAY[s]||s,type)}
function tableBadge(s){let type={'متاحة':'ok','مشغولة':'warn','بانتظار الحساب':'info','تحتاج تنظيف':'bad'}[s]||'dark';return badge(s,type)}
function updateTableFromOrder(o){let t=tableById(o.tableId);if(!t)return; t.currentOrderId=o.id; if(o.status==='delivered'&&o.paymentStatus==='paid')t.status='تحتاج تنظيف'; else if(o.paymentStatus!=='paid'&&['ready','onway','delivered'].includes(o.status))t.status='بانتظار الحساب'; else t.status='مشغولة';}
function deductOrder(o){if(o.inventoryDeducted)return; (o.items||[]).forEach(it=>{let d=dishById(it.menuId);(d?.recipe||[]).forEach(ing=>{let p=productByIngredient(ing);if(!p)return;let before=prodStock(p), q=num(ing.qty)*num(it.qty), after=before-q;setProdStock(p,after);col('restaurantInventoryMovements').unshift({id:uid('rim'),date:now(),type:'خصم طلب مطعم',productId:p.id,productName:p.name||ing.productName,qty:-q,before,after,orderNo:o.no,note:it.name});});});o.inventoryDeducted=true;}
function addMovement(accountId,type,amount,source,note){amount=num(amount);if(!amount)return;let acc=col('accounts').find(a=>a.id===accountId)||col('accounts')[0];if(!acc)return;let before=num(acc.balance);let after=type==='out'?before-amount:before+amount;acc.balance=after;col('accountMovements').unshift({id:uid('mov'),date:now(),accountId:acc.id,accountName:acc.name,type:type==='out'?'خروج':'دخول',amount,balanceBefore:before,balanceAfter:after,source,note});}
function postRestaurantSale(o){let sales=col('restaurantSales');let id='sale-rest-'+o.id;let rec=sales.find(s=>s.id===id);let payload={id,invoiceNo:o.no,date:o.date,customerName:o.customerName||'زبون طاولة',branch:'المطعم',paymentMethod:'مطعم',accountId:o.accountId||'',total:o.total,paid:o.paid,due:Math.max(0,o.total-o.paid),items:o.items.map(i=>({name:i.name,qty:i.qty,unitPrice:i.price,total:i.total,sku:'REST'})),source:'restaurant',restaurantOrderId:o.id,createdAt:o.createdAt||new Date().toISOString(),_updatedAt:new Date().toISOString()};if(rec)Object.assign(rec,payload);else sales.unshift(payload);}
function applyPayment(orderId,amount,accountId,method='كاش'){let o=orderById(orderId);if(!o)return;amount=Math.min(num(amount),Math.max(0,num(o.total)-num(o.paid)));if(amount<=0)return toast('لا يوجد مبلغ متبقٍ');o.paid=num(o.paid)+amount;o.accountId=accountId||o.accountId||col('accounts')[0]?.id||'';o.paymentMethod=method;o.paymentStatus=o.paid>=o.total?'paid':'partial';col('restaurantPayments').unshift({id:uid('rpay'),date:now(),orderId:o.id,orderNo:o.no,amount,accountId:o.accountId,method});addMovement(o.accountId,'in',amount,'طلب مطعم '+o.no,'دفعة طاولة '+(o.tableName||''));postRestaurantSale(o);updateTableFromOrder(o);syncLight();render();toast('تم تسجيل الدفعة')}
function releaseTable(tableId){let t=tableById(tableId);if(!t)return;t.status='متاحة';t.currentOrderId='';t.lastClearedAt=now();syncLight();render();toast('تم تفريغ الطاولة')}
function cancelOrder(id){let o=orderById(id);if(!o)return;if(!confirm('إلغاء الطلب؟'))return;o.status='cancelled';let t=tableById(o.tableId);if(t&&t.currentOrderId===id){t.status='متاحة';t.currentOrderId=''}syncLight();render();}
function changeStatus(id,s){let o=orderById(id);if(!o)return;o.status=s;o.updatedAt=new Date().toISOString();updateTableFromOrder(o);postRestaurantSale(o);syncLight();render();}
function accountsOptions(sel=''){let arr=col('accounts');if(!arr.length)arr=[{id:'cash-main',name:'الصندوق الرئيسي'}];return arr.map(a=>`<option value="${safe(a.id)}" ${sel===a.id?'selected':''}>${safe(a.name)}</option>`).join('')}
function tablesOptions(sel=''){return col('restaurantTables').map(t=>`<option value="${safe(t.id)}" ${sel===t.id?'selected':''}>${safe(t.name)}</option>`).join('')}
function productsOptions(sel=''){return col('restaurantProducts').map(p=>`<option value="${safe(p.id)}" ${sel===p.id?'selected':''}>${safe(p.name||p.sku||p.id)}</option>`).join('')}
function openModal(title,html){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=html;document.getElementById('modalBack').style.display='flex'}
function closeModal(){document.getElementById('modalBack').style.display='none'}
function printPage(){window.print()}
function copyText(txt){navigator.clipboard?.writeText(txt).then(()=>toast('تم النسخ')).catch(()=>prompt('انسخ الرابط',txt))}
function renderShell(){let isPublic=PAGE_KIND==='menu'&&new URLSearchParams(location.search).get('table');document.body.classList.toggle('public-shell',!!isPublic);document.getElementById('nav').innerHTML=navHTML();document.getElementById('pageTitle').textContent=PAGE_TITLE;document.getElementById('storeName').textContent=settings().storeName||'كاشير أوسكار';document.getElementById('modeState').textContent=settings().restaurantMode==='on'?'وضع المطعم مفعّل':'وضع المطعم غير مفعّل';}
function render(){refreshDB();renderShell();let map={tables:renderTables,kitchen:renderKitchen,menu:renderMenu,cashier:renderCashier,recipes:renderRecipes,inventory:renderInventory,reservations:renderReservations,analytics:renderAnalytics};(map[PAGE_KIND]||renderTables)();}
function renderTables(){let active=col('restaurantOrders').filter(o=>!['delivered','cancelled'].includes(o.status)||o.paymentStatus!=='paid').length;let unpaid=col('restaurantOrders').filter(o=>o.paymentStatus!=='paid'&&o.status!=='cancelled').reduce((s,o)=>s+num(o.total)-num(o.paid),0);let busy=col('restaurantTables').filter(t=>t.status!=='متاحة').length;document.getElementById('main').innerHTML=`<div class="kpis"><div class="kpi"><span>الطاولات المشغولة</span><strong>${busy}</strong></div><div class="kpi"><span>طلبات مفتوحة</span><strong>${active}</strong></div><div class="kpi"><span>غير محاسب</span><strong>${money(unpaid)}</strong></div><div class="kpi"><span>عدد الطاولات</span><strong>${col('restaurantTables').length}</strong></div></div><section class="card"><div class="tools"><button class="btn primary" onclick="openTableForm()">+ إضافة طاولة</button><button class="btn ghost" onclick="pullLight()">تحديث/مزامنة</button><button class="btn ghost" onclick="printPage()">طباعة</button></div></section><div class="tables-grid">${col('restaurantTables').map(tableCard).join('')}</div>`}
function tableCard(t){let o=orderById(t.currentOrderId)||col('restaurantOrders').filter(x=>x.tableId===t.id&&x.status!=='cancelled').sort((a,b)=>String(b.createdAt||'').localeCompare(String(a.createdAt||'')))[0];let cls=t.status==='متاحة'?'free':t.status==='تحتاج تنظيف'?'clean':t.status==='بانتظار الحساب'?'wait':'busy';let due=o?Math.max(0,num(o.total)-num(o.paid)):0;return `<div class="table-card ${cls}"><div class="table-head"><h3>${safe(t.name)}</h3>${tableBadge(t.status||'متاحة')}</div><div class="muted">عدد الكراسي: ${safe(t.seats||'')}</div>${o?`<div style="margin:10px 0">${statusBadge(o.status)} ${payBadge(o.paymentStatus)}</div><div class="price">${money(o.total)}</div><div class="muted">المتبقي: ${money(due)}</div>`:`<div class="muted" style="margin:10px 0">لا يوجد طلب مفتوح</div>`}<div class="grid2" style="align-items:center;margin:12px 0"><img class="qr" src="${qrURL(t)}" alt="QR"><div class="tools"><button class="btn small info" onclick="copyText('${tableLink(t).replace(/'/g,'%27')}')">نسخ الرابط</button><a class="btn small ghost" target="_blank" href="${tableLink(t)}">فتح المنيو</a></div></div><div class="tools">${o?`<button class="btn small primary" onclick="openPayment('${o.id}')">محاسبة</button><button class="btn small warn" onclick="changeStatus('${o.id}','delivered')">تم التسليم</button><button class="btn small danger" onclick="cancelOrder('${o.id}')">إلغاء</button>`:''}<button class="btn small dark" onclick="releaseTable('${t.id}')">الطاولة فضيت</button></div></div>`}
function openTableForm(){openModal('إضافة طاولة',`<form id="tableForm" class="grid"><div class="field"><label>اسم/رقم الطاولة</label><input name="name" required placeholder="طاولة 11"></div><div class="field"><label>عدد الكراسي</label><input name="seats" type="number" value="4"></div><div class="field"><label>الحالة</label><select name="status"><option>متاحة</option><option>مشغولة</option><option>تحتاج تنظيف</option></select></div></form><div class="tools" style="margin-top:12px"><button class="btn primary" onclick="saveTable()">حفظ</button></div>`)}
function saveTable(){let f=new FormData(document.getElementById('tableForm'));col('restaurantTables').push({id:uid('tbl'),name:f.get('name'),seats:f.get('seats'),status:f.get('status'),currentOrderId:'',createdAt:new Date().toISOString()});syncLight();closeModal();render();}
function openPayment(id){let o=orderById(id);let due=Math.max(0,num(o.total)-num(o.paid));openModal('محاسبة '+o.no,`<div class="kpis"><div class="kpi"><span>الإجمالي</span><strong>${money(o.total)}</strong></div><div class="kpi"><span>المدفوع</span><strong>${money(o.paid)}</strong></div><div class="kpi"><span>المتبقي</span><strong>${money(due)}</strong></div><div class="kpi"><span>الطاولة</span><strong>${safe(o.tableName)}</strong></div></div><div class="grid"><div class="field"><label>المبلغ المدفوع الآن</label><input id="payAmount" type="number" value="${due}" step="0.01"></div><div class="field"><label>الحساب</label><select id="payAccount">${accountsOptions(o.accountId)}</select></div><div class="field"><label>طريقة الدفع</label><select id="payMethod"><option>كاش</option><option>بطاقة</option><option>تحويل</option><option>محفظة</option></select></div></div><div class="tools" style="margin-top:12px"><button class="btn primary" onclick="applyPayment('${id}',document.getElementById('payAmount').value,document.getElementById('payAccount').value,document.getElementById('payMethod').value);closeModal()">تسجيل الدفعة</button><button class="btn dark" onclick="releaseTable('${o.tableId}');closeModal()">تم الدفع والطاولة فضيت</button></div>`)}
function renderKitchen(){let groups=[['new','طلبات جديدة'],['preparing','قيد التحضير'],['ready','جاهز'],['onway','خرج للطاولة']];let orders=col('restaurantOrders').filter(o=>!['delivered','cancelled'].includes(o.status));document.getElementById('main').innerHTML=`<section class="card"><div class="tools"><button class="btn primary" onclick="pullLight()">تحديث الطلبات</button><a class="btn ghost" href="مطعم-الطاولات.html">فتح الطاولات</a></div></section><div class="kds-board">${groups.map(([st,title])=>`<div class="kds-col"><h3>${title}</h3>${orders.filter(o=>o.status===st).map(orderCard).join('')||'<div class="muted">لا يوجد</div>'}</div>`).join('')}</div>`}
function orderCard(o){return `<div class="order-card"><div style="display:flex;justify-content:space-between;gap:8px"><b>${safe(o.no)} - ${safe(o.tableName)}</b>${statusBadge(o.status)}</div><div>${(o.items||[]).map(i=>`<div><b>${safe(i.qty)}× ${safe(i.name)}</b><div class="muted">${safe((i.extras||[]).join('، '))} ${i.removes?.length?' | حذف: '+safe(i.removes.join('، ')):''} ${i.chefNote?' | ملاحظة: '+safe(i.chefNote):''}</div></div>`).join('')}</div><div class="tools">${o.status==='new'?`<button class="btn small warn" onclick="changeStatus('${o.id}','preparing')">بدء التحضير</button>`:''}${o.status==='preparing'?`<button class="btn small ok primary" onclick="changeStatus('${o.id}','ready')">تم التحضير</button>`:''}${o.status==='ready'?`<button class="btn small info" onclick="changeStatus('${o.id}','onway')">خرج للطاولة</button>`:''}${o.status==='onway'?`<button class="btn small dark" onclick="changeStatus('${o.id}','delivered')">تم التسليم</button>`:''}<button class="btn small danger" onclick="cancelOrder('${o.id}')">إلغاء</button></div></div>`}
let cart=[];
function cartKey(){return 'rest_cart_'+(new URLSearchParams(location.search).get('table')||'admin')}
function loadCart(){try{cart=JSON.parse(sessionStorage.getItem(cartKey())||'[]')}catch(e){cart=[]}}
function saveCart(){sessionStorage.setItem(cartKey(),JSON.stringify(cart))}
function renderMenu(){let tableId=new URLSearchParams(location.search).get('table');if(tableId)return renderPublicMenu(tableId);renderMenuAdmin()}
function renderPublicMenu(tableId){loadCart();let t=tableById(tableId)||{id:tableId,name:'طاولة'};let dishes=col('restaurantMenu').filter(d=>d.active!=='غير نشط');let total=cart.reduce((s,i)=>s+num(i.total),0);let last=sessionStorage.getItem('last_order_'+tableId);let lastOrder=last?orderById(last):null;document.getElementById('main').innerHTML=`<div class="public-hero"><h1 style="margin:0 0 6px">${safe(settings().storeName||'مطعم أوسكار')}</h1><div>أنت تطلب الآن من ${safe(t.name)} — الطلب يصل مباشرة للمطبخ والكاشير.</div></div>${lastOrder?`<section class="card"><h3>تتبع طلبك ${safe(lastOrder.no)}</h3><div class="tools">${statusBadge(lastOrder.status)} ${payBadge(lastOrder.paymentStatus)} <b>${money(lastOrder.total)}</b></div></section>`:''}<div class="menu-grid">${dishes.map(dishPublicCard).join('')}</div><section class="card cart-sticky"><h3>سلة الطلب</h3>${cart.length?cart.map((i,idx)=>`<div style="display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:8px 0"><span>${safe(i.qty)}× ${safe(i.name)}</span><b>${money(i.total)}</b><button class="btn small danger" onclick="cart.splice(${idx},1);saveCart();render()">حذف</button></div>`).join(''):'<div class="muted">السلة فارغة</div>'}<div class="tools" style="margin-top:12px"><b class="price">${money(total)}</b><button class="btn primary" onclick="submitPublicOrder('${safe(tableId)}')" ${cart.length?'':'disabled'}>إرسال الطلب للمطبخ</button></div></section>`}
function dishPublicCard(d){let img=d.image?`<img src="${safe(d.image)}" alt="">`:'🍽️';return `<div class="dish"><div class="dish-img">${img}</div><div class="dish-body"><h3>${safe(d.name)}</h3><div class="muted">${safe(d.desc||'')}</div><div class="price">${money(d.price)}</div><button class="btn primary" style="width:100%;margin-top:10px" onclick="openDish('${d.id}')">اختيار الطبق</button></div></div>`}
function openDish(id){let d=dishById(id);let extras=(d.extras||'').split('\n').filter(Boolean).map((x,i)=>{let [n,p]=x.split(':');return {n:n.trim(),p:num(p),i}});let removes=(d.removes||'').split('\n').filter(Boolean);openModal(d.name,`<div class="grid"><div class="field"><label>الكمية</label><input id="dishQty" type="number" min="1" value="1"></div></div><h4>إضافات</h4><div class="grid2">${extras.map(e=>`<label class="card" style="margin:0"><input type="checkbox" class="extra" data-name="${safe(e.n)}" data-price="${e.p}"> ${safe(e.n)} <b>${money(e.p)}</b></label>`).join('')||'<div class="muted">لا يوجد</div>'}</div><h4>حذف مكونات</h4><div class="grid2">${removes.map(r=>`<label class="card" style="margin:0"><input type="checkbox" class="remove" value="${safe(r)}"> ${safe(r)}</label>`).join('')||'<div class="muted">لا يوجد</div>'}</div><div class="field" style="margin-top:12px"><label>ملاحظات الشيف</label><textarea id="chefNote" placeholder="مثلاً: درجة الاستواء، بدون ملح..."></textarea></div><div class="tools" style="margin-top:12px"><button class="btn primary" onclick="addDishToCart('${id}')">إضافة للسلة</button></div>`)}
function addDishToCart(id){let d=dishById(id);let qty=num(document.getElementById('dishQty').value)||1;let extras=[...document.querySelectorAll('.extra:checked')].map(x=>({name:x.dataset.name,price:num(x.dataset.price)}));let removes=[...document.querySelectorAll('.remove:checked')].map(x=>x.value);let extraTotal=extras.reduce((s,e)=>s+e.price,0);cart.push({menuId:id,name:d.name,qty,price:num(d.price)+extraTotal,basePrice:num(d.price),extras:extras.map(e=>e.name),removes,chefNote:document.getElementById('chefNote').value,total:(num(d.price)+extraTotal)*qty});saveCart();closeModal();render();toast('تمت الإضافة للسلة')}
function submitPublicOrder(tableId){let t=tableById(tableId)||{id:tableId,name:'طاولة'};let html=`<div class="grid"><div class="field"><label>اسم الزبون اختياري</label><input id="customerName"></div><div class="field"><label>رقم الهاتف للولاء/التتبع</label><input id="customerPhone" inputmode="tel"></div><div class="field"><label>ملاحظات عامة</label><input id="orderNote"></div></div><div class="tools" style="margin-top:12px"><button class="btn primary" onclick="confirmPublicOrder('${tableId}')">تأكيد وإرسال</button></div>`;openModal('تأكيد الطلب',html)}
function confirmPublicOrder(tableId){let t=tableById(tableId)||{id:tableId,name:'طاولة'};let o={id:uid('ord'),no:'R-'+Date.now().toString().slice(-6),createdAt:new Date().toISOString(),date:today(),time:now(),tableId,tableName:t.name||tableId,customerName:document.getElementById('customerName').value,customerPhone:document.getElementById('customerPhone').value,note:document.getElementById('orderNote').value,status:'new',paymentStatus:'unpaid',paid:0,items:cart,total:cart.reduce((s,i)=>s+num(i.total),0)};o.cost=orderCost(o);deductOrder(o);col('restaurantOrders').unshift(o);let tb=tableById(tableId);if(tb){tb.status='مشغولة';tb.currentOrderId=o.id}if(o.customerPhone){let l=col('restaurantLoyalty').find(x=>x.phone===o.customerPhone)||{id:uid('loy'),phone:o.customerPhone,name:o.customerName,visits:0,total:0};l.visits=num(l.visits)+1;l.total=num(l.total)+o.total;if(!col('restaurantLoyalty').includes(l))col('restaurantLoyalty').push(l)}sessionStorage.setItem('last_order_'+tableId,o.id);cart=[];saveCart();syncLight();closeModal();render();toast('تم إرسال الطلب للمطبخ')}
function renderMenuAdmin(){let dishes=col('restaurantMenu');document.getElementById('main').innerHTML=`<section class="card"><div class="tools"><button class="btn primary" onclick="openDishForm()">+ إضافة طبق</button><a class="btn ghost" href="مطعم-الوصفات-والتكلفة.html">إدارة الوصفات</a></div></section><div class="menu-grid">${dishes.map(d=>`<div class="dish"><div class="dish-img">${d.image?`<img src="${safe(d.image)}">`:'🍽️'}</div><div class="dish-body"><h3>${safe(d.name)}</h3><div class="muted">${safe(d.category||'')}</div><div class="price">${money(d.price)}</div><div class="muted">تكلفة: ${money(dishCost(d))} | هامش: ${num(d.price)?Math.round((num(d.price)-dishCost(d))/num(d.price)*100):0}%</div><div class="tools" style="margin-top:10px"><button class="btn small ghost" onclick="openDishForm('${d.id}')">تعديل</button><button class="btn small danger" onclick="deleteDish('${d.id}')">حذف</button><a class="btn small info" href="مطعم-المنيو-الرقمي.html?preview=${d.id}">معاينة</a></div></div></div>`).join('')}</div>`}
function openDishForm(id=''){let d=id?dishById(id):{recipe:[]};let recipe=(d.recipe&&d.recipe.length?d.recipe:[{productId:'',productName:'',qty:1,unit:'قطعة',costOverride:0}]);openModal(id?'تعديل طبق':'إضافة طبق',`<form id="dishForm" class="grid"><input type="hidden" name="id" value="${safe(id)}"><div class="field"><label>اسم الطبق</label><input name="name" value="${safe(d.name||'')}" required></div><div class="field"><label>القسم</label><input name="category" value="${safe(d.category||'')}" placeholder="مشاوي، بيتزا..."></div><div class="field"><label>سعر البيع</label><input name="price" type="number" step="0.01" value="${num(d.price)}"></div><div class="field"><label>رابط صورة</label><input name="image" value="${safe(d.image||'')}"></div><div class="field"><label>الحالة</label><select name="active"><option ${d.active!=='غير نشط'?'selected':''}>نشط</option><option ${d.active==='غير نشط'?'selected':''}>غير نشط</option></select></div><div class="field"><label>الوصف</label><input name="desc" value="${safe(d.desc||'')}"></div><div class="field"><label>الإضافات كل سطر: الاسم:السعر</label><textarea name="extras">${safe(d.extras||'')}</textarea></div><div class="field"><label>الحذف/الاختيارات كل سطر</label><textarea name="removes">${safe(d.removes||'')}</textarea></div></form><section class="card"><h3>مكونات الوصفة</h3><div id="recipeRows">${recipe.map((r,i)=>recipeRow(r,i)).join('')}</div><button class="btn ghost" onclick="addRecipeRow()">+ مكون</button></section><div class="tools"><button class="btn primary" onclick="saveDishForm()">حفظ الطبق والوصفة</button></div>`)}
function recipeRow(r={},i=0){return `<div class="grid recipe-row" style="margin-bottom:8px"><div class="field"><label>مادة من المخزون</label><select class="ingProduct"><option value="">يدوي</option>${productsOptions(r.productId)}</select></div><div class="field"><label>اسم المادة اليدوي</label><input class="ingName" value="${safe(r.productName||'')}"></div><div class="field"><label>الكمية</label><input class="ingQty" type="number" step="0.001" value="${num(r.qty)||1}"></div><div class="field"><label>الوحدة</label><input class="ingUnit" value="${safe(r.unit||'قطعة')}"></div><div class="field"><label>تكلفة يدوية للوحدة</label><input class="ingCost" type="number" step="0.001" value="${num(r.costOverride)}"></div><div class="field"><label>حذف</label><button class="btn danger" type="button" onclick="this.closest('.recipe-row').remove()">حذف</button></div></div>`}
function addRecipeRow(){document.getElementById('recipeRows').insertAdjacentHTML('beforeend',recipeRow({},Date.now()))}
function saveDishForm(){let f=document.getElementById('dishForm');let data=Object.fromEntries(new FormData(f).entries());data.price=num(data.price);data.recipe=[...document.querySelectorAll('.recipe-row')].map(r=>{let pid=r.querySelector('.ingProduct').value;let p=col('restaurantProducts').find(x=>x.id===pid);return {productId:pid,productName:r.querySelector('.ingName').value||p?.name||'',qty:num(r.querySelector('.ingQty').value),unit:r.querySelector('.ingUnit').value,costOverride:num(r.querySelector('.ingCost').value)}}).filter(x=>x.productId||x.productName);let arr=col('restaurantMenu');if(data.id){let old=arr.find(x=>x.id===data.id);Object.assign(old,data,{_updatedAt:new Date().toISOString()})}else{data.id=uid('dish');data.createdAt=new Date().toISOString();arr.unshift(data)}syncLight();closeModal();render();toast('تم حفظ الطبق')}
function deleteDish(id){if(!confirm('حذف الطبق؟'))return;DB.restaurantMenu=col('restaurantMenu').filter(d=>d.id!==id);syncLight();render()}
function renderRecipes(){let dishes=col('restaurantMenu');document.getElementById('main').innerHTML=`<section class="card"><div class="tools"><button class="btn primary" onclick="openDishForm()">+ طبق/وصفة جديدة</button><a class="btn ghost" href="مطعم-مخزون-المطعم.html">مخزون المواد الخام</a></div></section><div class="table-wrap"><table class="data-table"><thead><tr><th>الطبق</th><th>القسم</th><th>سعر البيع</th><th>تكلفة المكونات</th><th>هامش الربح</th><th>المكونات</th><th>إجراءات</th></tr></thead><tbody>${dishes.map(d=>{let c=dishCost(d),m=num(d.price)-c,p=num(d.price)?Math.round(m/num(d.price)*100):0;return `<tr><td>${safe(d.name)}</td><td>${safe(d.category||'')}</td><td>${money(d.price)}</td><td>${money(c)}</td><td>${money(m)} (${p}%)</td><td>${(d.recipe||[]).map(i=>safe((i.productName||'مادة')+' '+i.qty+' '+i.unit)).join('<br>')}</td><td><button class="btn small ghost" onclick="openDishForm('${d.id}')">تعديل</button></td></tr>`}).join('')}</tbody></table></div>`}
function renderInventory(){let products=col('restaurantProducts');let alerts=products.filter(p=>prodStock(p)<=num(p.reorderPoint||p.alertQty||p.minStock));let waste=col('restaurantWastage').reduce((s,w)=>s+num(w.cost),0);document.getElementById('main').innerHTML=`<div class="kpis"><div class="kpi"><span>مواد تحت حد الطلب</span><strong>${alerts.length}</strong></div><div class="kpi"><span>قيمة الهالك</span><strong>${money(waste)}</strong></div><div class="kpi"><span>عدد المواد</span><strong>${products.length}</strong></div><div class="kpi"><span>حركات مطبخ</span><strong>${col('restaurantInventoryMovements').length}</strong></div></div><section class="card"><h3>تسجيل هالك / تالف</h3><div class="grid"><div class="field"><label>المادة</label><select id="wProduct">${productsOptions()}</select></div><div class="field"><label>الكمية</label><input id="wQty" type="number" step="0.001" value="1"></div><div class="field"><label>السبب</label><input id="wReason" placeholder="انتهاء، تلف، خطأ تحضير..."></div></div><div class="tools" style="margin-top:12px"><button class="btn primary" onclick="saveWastage()">حفظ الهالك وخصمه</button></div></section><div class="table-wrap"><table class="data-table"><thead><tr><th>المادة</th><th>المخزون الحالي</th><th>حد الطلب</th><th>تكلفة الوحدة</th><th>الحالة</th></tr></thead><tbody>${products.map(p=>`<tr><td>${safe(p.name||p.sku||p.id)}</td><td>${prodStock(p)}</td><td><input style="width:90px" type="number" value="${num(p.reorderPoint||p.alertQty||0)}" onchange="setReorder('${p.id}',this.value)"></td><td>${money(prodCost(p))}</td><td>${prodStock(p)<=num(p.reorderPoint||p.alertQty||0)?badge('تنبيه طلب','bad'):badge('آمن','ok')}</td></tr>`).join('')||`<tr><td colspan="5" style="text-align:center" class="muted">أضف مواد المطعم من زر إضافة مادة خام ليظهر مخزون المطعم هنا</td></tr>`}</tbody></table></div>`}
function setReorder(id,v){let p=col('restaurantProducts').find(x=>x.id===id);if(p){p.reorderPoint=num(v);syncLight();}}
function saveWastage(){let id=document.getElementById('wProduct').value,p=col('restaurantProducts').find(x=>x.id===id);if(!p)return toast('اختر مادة');let q=num(document.getElementById('wQty').value),before=prodStock(p),after=before-q;setProdStock(p,after);let cost=prodCost(p)*q;col('restaurantWastage').unshift({id:uid('wst'),date:now(),productId:p.id,productName:p.name,qty:q,cost,reason:document.getElementById('wReason').value});col('restaurantInventoryMovements').unshift({id:uid('rim'),date:now(),type:'هالك مطعم',productId:p.id,productName:p.name,qty:-q,before,after,note:document.getElementById('wReason').value});syncLight();render();toast('تم خصم الهالك من المخزون والأرباح')}
function renderReservations(){document.getElementById('main').innerHTML=`<section class="card"><h3>حجز طاولة</h3><div class="grid"><div class="field"><label>اسم الزبون</label><input id="resName"></div><div class="field"><label>الهاتف</label><input id="resPhone"></div><div class="field"><label>الطاولة</label><select id="resTable">${tablesOptions()}</select></div><div class="field"><label>التاريخ</label><input id="resDate" type="date" value="${today()}"></div><div class="field"><label>الوقت</label><input id="resTime" type="time"></div><div class="field"><label>عدد الأشخاص</label><input id="resGuests" type="number" value="2"></div><div class="field"><label>ملاحظات</label><input id="resNote"></div></div><div class="tools" style="margin-top:12px"><button class="btn primary" onclick="saveReservation()">حفظ الحجز</button></div></section><div class="table-wrap"><table class="data-table"><thead><tr><th>التاريخ</th><th>الوقت</th><th>الطاولة</th><th>الزبون</th><th>الهاتف</th><th>الأشخاص</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody>${col('restaurantReservations').map(r=>`<tr><td>${safe(r.date)}</td><td>${safe(r.time)}</td><td>${safe(r.tableName)}</td><td>${safe(r.name)}</td><td>${safe(r.phone)}</td><td>${safe(r.guests)}</td><td>${badge(r.status||'محجوز','info')}</td><td><button class="btn small primary" onclick="markReservation('${r.id}','حضر')">حضر</button><button class="btn small danger" onclick="markReservation('${r.id}','ملغي')">إلغاء</button></td></tr>`).join('')||'<tr><td colspan="8" style="text-align:center" class="muted">لا توجد حجوزات</td></tr>'}</tbody></table></div>`}
function saveReservation(){let t=tableById(document.getElementById('resTable').value)||{};col('restaurantReservations').unshift({id:uid('res'),createdAt:new Date().toISOString(),name:document.getElementById('resName').value,phone:document.getElementById('resPhone').value,tableId:t.id,tableName:t.name,date:document.getElementById('resDate').value,time:document.getElementById('resTime').value,guests:document.getElementById('resGuests').value,note:document.getElementById('resNote').value,status:'محجوز'});syncLight();render();}
function markReservation(id,status){let r=col('restaurantReservations').find(x=>x.id===id);if(r){r.status=status;syncLight();render();}}
function renderAnalytics(){let orders=col('restaurantOrders').filter(o=>o.status!=='cancelled'),sales=orders.reduce((s,o)=>s+num(o.total),0),paid=orders.reduce((s,o)=>s+num(o.paid),0),cost=orders.reduce((s,o)=>s+(num(o.cost)||orderCost(o)),0),waste=col('restaurantWastage').reduce((s,w)=>s+num(w.cost),0),expenses=col('restaurantExpenses').reduce((s,e)=>s+num(e.amount||e.paid),0),net=sales-cost-waste-expenses;let rows={};orders.forEach(o=>(o.items||[]).forEach(i=>{let r=rows[i.menuId]||(rows[i.menuId]={name:i.name,qty:0,sales:0,cost:0});r.qty+=num(i.qty);r.sales+=num(i.total);r.cost+=dishCost(dishById(i.menuId)||{})*num(i.qty)}));let list=Object.values(rows).map(r=>({...r,profit:r.sales-r.cost,margin:r.sales?Math.round((r.sales-r.cost)/r.sales*100):0})).sort((a,b)=>b.profit-a.profit);document.getElementById('main').innerHTML=`<div class="kpis"><div class="kpi"><span>مبيعات المطعم</span><strong>${money(sales)}</strong></div><div class="kpi"><span>تكلفة المكونات</span><strong>${money(cost)}</strong></div><div class="kpi"><span>الهالك + المصاريف</span><strong>${money(waste+expenses)}</strong></div><div class="kpi"><span>صافي الربح</span><strong>${money(net)}</strong></div></div><section class="card"><h3>معادلة الربح</h3><div class="muted">سعر البيع - تكلفة المكونات - المصاريف التشغيلية - الهالك = صافي الربح</div><div class="bar" style="margin-top:12px"><i style="width:${Math.max(2,Math.min(100,(net/Math.max(sales,1))*100))}%"></i></div></section><section class="card"><h3>الأطباق الأكثر ربحية Menu Engineering</h3><div class="table-wrap"><table class="data-table"><thead><tr><th>الطبق</th><th>الكمية</th><th>المبيعات</th><th>التكلفة</th><th>الربح</th><th>الهامش</th></tr></thead><tbody>${list.map(r=>`<tr><td>${safe(r.name)}</td><td>${r.qty}</td><td>${money(r.sales)}</td><td>${money(r.cost)}</td><td>${money(r.profit)}</td><td>${r.margin}%</td></tr>`).join('')||'<tr><td colspan="6" style="text-align:center" class="muted">لا توجد طلبات بعد</td></tr>'}</tbody></table></div></section>`}
let __restLastSig='';function __restSig(d){try{let o=d.restaurantOrders||[],m=d.restaurantMenu||[],t=d.restaurantTables||[],p=d.restaurantProducts||[];let last=o[0]||{};return [o.length,m.length,t.length,p.length,last.id,last.updatedAt,last._updatedAt,last.status,last.paymentStatus,last.paid,last.total].join('|')}catch(e){return ''}}document.addEventListener('DOMContentLoaded',()=>{render();__restLastSig=__restSig(DB);setInterval(()=>{try{let newer=readDB(),sig=__restSig(newer);if(sig!==__restLastSig&&!document.querySelector('input:focus,textarea:focus,select:focus,.modal-back[style*="flex"]')){DB=newer;__restLastSig=sig;render()}}catch(e){console.warn(e)}},5000);setTimeout(pullLight,900);});
</script>
<script id="restaurant-professional-mobile-final-script">
(function(){
  const pageList=[
    ['مطعم-الطاولات.html','tables','الطاولات'],
    ['مطعم-المطبخ.html','kitchen','المطبخ KDS'],
    ['مطعم-المنيو-الرقمي.html','menu','المنيو الرقمي'],
    ['مطعم-كاشير-المطعم.html','cashier','كاشير المطعم'],
    ['مطعم-الوصفات-والتكلفة.html','recipes','الوصفات والتكلفة'],
    ['مطعم-مخزون-المطعم.html','inventory','مخزون المطعم'],
    ['مطعم-الحجوزات.html','reservations','الحجوزات'],
    ['مطعم-تحليلات-الأرباح.html','analytics','الأرباح والتحليلات']
  ];
  const oldIcon=window.icon;
  window.icon=function(name){
    if(name==='cashier')return '<svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M8 8h8M8 12h8M8 16h3"/><path d="M16 16h.01"/></svg>';
    if(name==='category')return '<svg viewBox="0 0 24 24"><path d="M4 6h6v6H4zM14 6h6v6h-6zM4 16h6v2H4zM14 16h6v2h-6z"/></svg>';
    return oldIcon?oldIcon(name):'';
  };
  function ensureCats(){
    if(typeof col!=='function')return [];
    const cats=col('restaurantCategories');
    const names=[...new Set(col('restaurantMenu').map(d=>String(d.category||'عام').trim()).filter(Boolean))];
    if(!cats.length){names.forEach((n,i)=>cats.push({id:'rcat-'+(i+1),name:n,active:'نشط',sort:i+1,desc:''}));}
    names.forEach(n=>{if(!cats.some(c=>c.name===n))cats.push({id:uid?uid('rcat'):'rcat-'+Date.now(),name:n,active:'نشط',sort:cats.length+1,desc:''})});
    return cats.filter(c=>c.active!=='غير نشط').sort((a,b)=>(Number(a.sort||0)-Number(b.sort||0))||String(a.name).localeCompare(String(b.name),'ar'));
  }
  window.navHTML=function(){let curr=decodeURIComponent(location.pathname.split('/').pop());return pageList.map(p=>`<a class="${curr===p[0]?'active':''}" href="${p[0]}">${icon(p[1])}<span>${p[2]}</span></a>`).join('')+`<a href="لوحة-المتابعة.html">${icon('analytics')}<span>العودة للنظام</span></a>`};
  window.renderShell=function(){let params=new URLSearchParams(location.search),isPublic=PAGE_KIND==='menu'&&params.get('table');document.body.classList.toggle('public-shell',!!isPublic);ensureCats();let nav=document.getElementById('nav');if(nav)nav.innerHTML=navHTML();let t=document.getElementById('pageTitle');if(t)t.textContent=isPublic?'المنيو الرقمي':PAGE_TITLE;let s=document.getElementById('storeName');if(s)s.textContent=settings().storeName||'كاشير أوسكار';let m=document.getElementById('modeState');if(m)m.textContent='Restaurant OS';};
  window.cartKey=function(){let table=new URLSearchParams(location.search).get('table');return 'rest_cart_'+(table||((window.PAGE_KIND||'')==='cashier'?'cashier':'admin'))};
  window.currentMenuCategory=window.currentMenuCategory||'all';
  window.selectMenuCategory=function(c){window.currentMenuCategory=c||'all';render();};
  function categoryChips(){let cats=ensureCats();let cur=window.currentMenuCategory||'all';return `<div class="restaurant-category-strip"><button class="${cur==='all'?'active':''}" onclick="selectMenuCategory('all')">الكل</button>${cats.map(c=>`<button class="${cur===c.name?'active':''}" onclick="selectMenuCategory('${safe(String(c.name).replace(/'/g,'&#39;'))}')">${safe(c.name)}</button>`).join('')}</div>`;}
  function categoryOptions(sel=''){let cats=ensureCats();return `<option value="">اختر القسم</option>`+cats.map(c=>`<option value="${safe(c.name)}" ${String(sel)===String(c.name)?'selected':''}>${safe(c.name)}</option>`).join('')}
  function filteredDishes(activeOnly=true){let cur=window.currentMenuCategory||'all';let list=col('restaurantMenu').filter(d=>!activeOnly||d.active!=='غير نشط');if(cur!=='all')list=list.filter(d=>String(d.category||'عام')===cur);return list;}
  window.openCategoryManager=function(){let cats=ensureCats();openModal('إدارة أقسام المنيو',`<section class="card"><div class="grid"><div class="field"><label>اسم القسم الجديد</label><input id="catName" placeholder="مثلاً: مشاوي، عصائر، بيتزا"></div><div class="field"><label>ترتيب الظهور</label><input id="catSort" type="number" value="${cats.length+1}"></div><div class="field"><label>وصف مختصر</label><input id="catDesc" placeholder="اختياري"></div></div><div class="tools" style="margin-top:12px"><button class="btn primary" onclick="saveCategoryFromModal()">حفظ القسم</button></div></section><div class="category-manage-grid">${cats.map(c=>`<div class="category-card"><b>${safe(c.name)}</b><span class="muted">${safe(c.desc||'')}</span><div class="tools" style="margin-top:8px"><button class="btn small danger" onclick="deleteCategory('${c.id}')">حذف</button></div></div>`).join('')}</div>`)};
  window.saveCategoryFromModal=function(){let name=(document.getElementById('catName')?.value||'').trim();if(!name)return toast('اكتب اسم القسم');let cats=col('restaurantCategories');let old=cats.find(c=>c.name===name);if(old){old.active='نشط';old.sort=Number(document.getElementById('catSort')?.value||old.sort||1);old.desc=document.getElementById('catDesc')?.value||old.desc||'';}else cats.push({id:uid('rcat'),name,sort:Number(document.getElementById('catSort')?.value||cats.length+1),desc:document.getElementById('catDesc')?.value||'',active:'نشط'});syncLight();openCategoryManager();toast('تم حفظ القسم')};
  window.deleteCategory=function(id){let c=col('restaurantCategories').find(x=>x.id===id);if(!c)return;if(col('restaurantMenu').some(d=>d.category===c.name))return toast('لا يمكن حذف قسم عليه أطباق. غيّر قسم الأطباق أولاً');c.active='غير نشط';syncLight();openCategoryManager();};
  window.dishPublicCard=function(d){let img=d.image?`<img src="${safe(d.image)}" alt="">`:'🍽️';return `<div class="dish"><div class="dish-img">${img}</div><div class="dish-body"><h3>${safe(d.name)}</h3><div class="muted">${safe(d.category||'عام')}</div><div class="muted">${safe(d.desc||'')}</div><div class="price">${money(d.price)}</div><button class="btn primary" style="width:100%;margin-top:8px" onclick="openDish('${d.id}')">اختيار</button></div></div>`};
  window.renderPublicMenu=function(tableId){loadCart();let t=tableById(tableId)||{id:tableId,name:'طاولة'};let dishes=filteredDishes(true);let total=cart.reduce((s,i)=>s+num(i.total),0);let last=sessionStorage.getItem('last_order_'+tableId);let lastOrder=last?orderById(last):null;document.getElementById('main').innerHTML=`<div class="public-hero"><h1 style="margin:0 0 6px">${safe(settings().storeName||'مطعم أوسكار')}</h1><div>أنت تطلب الآن من ${safe(t.name)} — اختر الأصناف وسيصل الطلب مباشرة للمطبخ.</div></div>${lastOrder?`<section class="card"><h3>تتبع طلبك ${safe(lastOrder.no)}</h3><div class="tools">${statusBadge(lastOrder.status)} ${payBadge(lastOrder.paymentStatus)} <b>${money(lastOrder.total)}</b></div></section>`:''}${categoryChips()}<div class="menu-grid">${dishes.map(dishPublicCard).join('')||'<section class="card muted">لا توجد أطباق في هذا القسم</section>'}</div><section class="card cart-sticky"><h3>سلة الطلب</h3>${cart.length?cart.map((i,idx)=>`<div class="cart-row"><span>${safe(i.qty)}× ${safe(i.name)}</span><b>${money(i.total)}</b><button class="btn small danger" onclick="cart.splice(${idx},1);saveCart();render()">حذف</button></div>`).join(''):'<div class="muted">السلة فارغة</div>'}<div class="tools" style="margin-top:12px"><b class="price">${money(total)}</b><button class="btn primary" onclick="submitPublicOrder('${safe(tableId)}')" ${cart.length?'':'disabled'}>إرسال الطلب للمطبخ</button></div></section>`};
  window.renderMenu=function(){let tableId=new URLSearchParams(location.search).get('table');if(tableId)return renderPublicMenu(tableId);renderMenuAdmin()};
  function parseExtras(str){return String(str||'').split('\n').filter(Boolean).map(x=>{let a=x.split(':');return {name:(a[0]||'').trim(),price:num(a[1]||0)}}).filter(x=>x.name)}
  function parseRemoves(str){return String(str||'').split('\n').map(x=>x.trim()).filter(Boolean)}
  window.extraRow=function(e={}){return `<div class="extra-row"><div class="field"><label>اسم الإضافة</label><input class="extraName" value="${safe(e.name||'')}" placeholder="جبنة إضافية"></div><div class="field"><label>سعر الإضافة</label><input class="extraPrice" type="number" step="0.01" value="${num(e.price)}"></div><button class="btn danger" type="button" onclick="this.closest('.extra-row').remove()">حذف</button></div>`};
  window.removeRow=function(v=''){return `<div class="remove-row"><div class="field"><label>مكون يمكن حذفه</label><input class="removeName" value="${safe(v)}" placeholder="بدون بصل"></div><button class="btn danger" type="button" onclick="this.closest('.remove-row').remove()">حذف</button></div>`};
  window.addExtraRow=function(){document.getElementById('extraRows').insertAdjacentHTML('beforeend',extraRow({}))};
  window.addRemoveRow=function(){document.getElementById('removeRows').insertAdjacentHTML('beforeend',removeRow(''))};
  window.openDish=function(id){let d=dishById(id);let extras=parseExtras(d.extras),removes=parseRemoves(d.removes);openModal(d.name,`<div class="option-panel"><div class="grid"><div class="field"><label>الكمية</label><input id="dishQty" type="number" min="1" value="1"></div></div><div><div class="option-title">اختر الإضافات</div><div class="option-grid">${extras.map(e=>`<label class="option-card"><span><input type="checkbox" class="extra" data-name="${safe(e.name)}" data-price="${e.price}"> ${safe(e.name)}</span><small>${money(e.price)}</small></label>`).join('')||'<div class="muted">لا توجد إضافات لهذا الطبق</div>'}</div></div><div><div class="option-title">حذف مكونات</div><div class="option-grid">${removes.map(r=>`<label class="option-card"><span><input type="checkbox" class="remove" value="${safe(r)}"> ${safe(r)}</span></label>`).join('')||'<div class="muted">لا توجد اختيارات حذف</div>'}</div></div><div class="field"><label>ملاحظات للشيف</label><textarea id="chefNote" placeholder="مثلاً: حار، بدون ملح، استواء متوسط..."></textarea></div><div class="tools"><button class="btn primary" onclick="addDishToCart('${id}')">إضافة للسلة</button></div></div>`)};
  window.renderMenuAdmin=function(){let dishes=filteredDishes(false);document.getElementById('main').innerHTML=`<section class="card"><div class="tools"><button class="btn primary" onclick="openDishForm()">+ إضافة طبق</button><button class="btn ghost" onclick="openCategoryManager()">إدارة أقسام المنيو</button><a class="btn ghost" href="مطعم-الوصفات-والتكلفة.html">إدارة الوصفات</a></div></section>${categoryChips()}<div class="menu-grid">${dishes.map(d=>`<div class="dish"><div class="dish-img">${d.image?`<img src="${safe(d.image)}">`:'🍽️'}</div><div class="dish-body"><h3>${safe(d.name)}</h3><div class="muted">${safe(d.category||'عام')}</div><div class="price">${money(d.price)}</div><div class="muted">تكلفة: ${money(dishCost(d))} | هامش: ${num(d.price)?Math.round((num(d.price)-dishCost(d))/num(d.price)*100):0}%</div><div class="tools" style="margin-top:10px"><button class="btn small ghost" onclick="openDishForm('${d.id}')">تعديل</button><button class="btn small danger" onclick="deleteDish('${d.id}')">حذف</button></div></div></div>`).join('')||'<section class="card muted">لا توجد أطباق في هذا القسم</section>'}</div>`};

  function updateSyncBadge(){fixSyncButton(); const b=$('.oskar-sync-btn,.sync-button'), c=b&&b.querySelector('.sync-count'), n=pendingCount(); if(c){c.textContent=n>99?'99+':String(n); c.style.display=n>0?'inline-flex':'none';}}
  function patchSyncNow(){if(window.syncNow && !window.syncNow.__r25Icon){const old=window.syncNow; window.syncNow=async function(){const b=syncBtn(); try{fixSyncButton(); b&&b.classList.add('syncing'); return await old.apply(this,arguments)} finally{b&&b.classList.remove('syncing'); setTimeout(updateSyncBadge,120)}}; window.syncNow.__r25Icon=true;}}
  function classifyField(f,ctl){const hay=((f.querySelector('label')?.textContent||'')+' '+(ctl.name||'')+' '+(ctl.id||'')+' '+(ctl.placeholder||'')).toLowerCase(); if(/email|mail|إيميل|الايميل|البريد/.test(hay)) f.classList.add('field-icon-email'); else if(/عميل|زبون|مورد|موظف|user|customer|supplier|employee|name|اسم/.test(hay)) f.classList.add('field-icon-user'); else if(/جوال|هاتف|موبايل|phone|mobile|tel/.test(hay)) f.classList.add('field-icon-phone'); else if(/باركود|barcode|sku|code|invoice|reference|رقم/.test(hay)) f.classList.add('field-icon-barcode'); else if(/سعر|مبلغ|مدفوع|خصم|رصيد|اجمالي|إجمالي|total|price|amount|balance|paid|due|cost/.test(hay)) f.classList.add('field-icon-money'); else if(/تاريخ|date/.test(hay)) f.classList.add('field-icon-date'); else if(/صنف|منتج|product|item/.test(hay)) f.classList.add('field-icon-product'); else if(/عدد|كمية|quantity|qty|count/.test(hay)) f.classList.add('field-icon-qty'); else if(/حساب|دفع|payment|account|bank|cash/.test(hay)) f.classList.add('field-icon-account'); else if(/ملاحظة|وصف|عنوان|note|address|description/.test(hay)) f.classList.add('field-icon-note'); else f.classList.add('field-icon-list');}
  function modernizeFields(root=document){$$('.field',root).forEach(f=>{const ctl=$(':scope > input:not([type="hidden"]),:scope > select,:scope > textarea',f)||$('input:not([type="hidden"]),select,textarea',f); if(!ctl||ctl.closest('td'))return; f.classList.add('oskar-modern-field'); classifyField(f,ctl); const label=(f.querySelector('label')?.textContent||'').replace('*','').trim(); if((ctl.tagName==='INPUT'||ctl.tagName==='TEXTAREA')&&!ctl.placeholder)ctl.placeholder=/email|mail/i.test(ctl.name||ctl.id||'')?'example@mail.com':(label?('ادخل '+label):''); const hay=(label+' '+(ctl.name||'')+' '+(ctl.id||'')).toLowerCase(); if(ctl.tagName==='INPUT' && /phone|mobile|tel|جوال|هاتف|موبايل/.test(hay) && !ctl.closest('.phone-control')){f.classList.add('oskar-phone-field'); const box=document.createElement('div'); box.className='phone-control'; const pref=document.createElement('span'); pref.className='phone-prefix'; pref.innerHTML='<span class="flag">🇮🇱</span><b>+972</b><span class="chev">⌄</span>'; ctl.parentNode.insertBefore(box,ctl); box.appendChild(pref); box.appendChild(ctl); if(!ctl.placeholder)ctl.placeholder='xxx-xxx-xxx'; }});}
  function polishInvoiceButtons(root=document){$$('[data-r19-inv],[data-invoice-action]',root).forEach(b=>{const act=b.dataset.r19Inv||b.dataset.invoiceAction; const key=act==='trash'?'delete':act; if(!ai[key])return; b.innerHTML=ai[key]; b.title=actionTitles[key]||b.title||key; b.setAttribute('aria-label',b.title); b.classList.add('invoice-icon-btn');});}
  function accountingPage(){const f=decodeURIComponent(location.pathname.split('/').pop()||''); return {'إدارة-الحسابات.html':'Accounts','سجل-الحسابات.html':'Account Ledger','تقرير-الحسابات.html':'Accounts Report','تحويل-مالي.html':'Money Transfer'}[f]||'';}
  const accNameMap={'الصندوق الرئيسي':'Main Cashbox','حساب البنك':'Main Bank Account','حساب تطبيقات تحت التحصيل':'Apps Receivable Wallet','مسحوبات الشخصي':'Owner Drawings','حساب كاش افتراضي':'Default cash account'};
  const accTypeMap={'الأصول المتداولة':'Current Assets','الخصوم المتداولة':'Current Liabilities','حقوق الملكية':'Equity','مصروفات':'Expenses','إيرادات':'Revenue','نشط':'Active','غير نشط':'Inactive','وارد':'In','صادر':'Out','رصيد افتتاحي':'Opening Balance','إنشاء حساب':'Account Created','تحويل مالي':'Transfer','إيداع يدوي':'Manual Deposit','سحب يدوي':'Manual Withdrawal','من إدارة الحسابات':'Account Management'};
  function tr(v){return accTypeMap[v]||accNameMap[v]||v||''}
  function normalizeAccounts(){try{(window.collection?collection('accounts'):[]).forEach(a=>{if(accNameMap[a.name])a.name=accNameMap[a.name]; if(accTypeMap[a.type])a.type=accTypeMap[a.type]; if(accTypeMap[a.active])a.active=accTypeMap[a.active]; if(accTypeMap[a.note])a.note=accTypeMap[a.note];});}catch(_){}}
  function moneyFn(n){try{return (window.money2||window.money)(n)}catch(_){return (Number(n||0).toFixed(2))}}
  function accountRows(){try{return window.getFilteredRows?getFilteredRows('accounts'):collection('accounts')}catch(_){return []}}
  function accountBy(id){try{return (collection('accounts')||[]).find(a=>String(a.id)===String(id))||{} }catch(_){return {}}}
  function accountOptions(selected){try{return '<option value="">Select account</option>'+collection('accounts').map(a=>'<option value="'+e(a.id||a.name)+'" '+(String(selected||'')===String(a.id||a.name)?'selected':'')+'>'+e(tr(a.name||a.id))+'</option>').join('')}catch(_){return ''}}
  function accountingActions(id){return '<div class="action-icons"><button class="btn small ghost" title="Edit" onclick="openAccountForm(\''+e(id)+'\')">'+ai.edit+'</button><button class="btn small success" title="Deposit" onclick="quickMovement(\''+e(id)+'\',\'in\')">'+ai.pay+'</button><button class="btn small danger" title="Withdraw" onclick="quickMovement(\''+e(id)+'\',\'out\')">'+ai.delete+'</button></div>'}
  function patchAccounting(){const title=accountingPage(); if(!title)return; document.body.classList.add('oskar-accounting-en'); document.title=title+' - Oskar Cashier'; if(window.CFG){CFG.title=title; CFG.menu='Accounting';} normalizeAccounts(); const h=$('.title-row h1'); if(h)h.textContent=title; $$('a[href="إدارة-الحسابات.html"]').forEach(a=>a.textContent='Accounts'); $$('a[href="سجل-الحسابات.html"]').forEach(a=>a.textContent='Account Ledger'); $$('a[href="تقرير-الحسابات.html"]').forEach(a=>a.textContent='Accounts Report'); $$('a[href="تحويل-مالي.html"]').forEach(a=>a.textContent='Money Transfer'); $$('.menu-head b').forEach(b=>{if(/إدارة الحسابات|الحسابات/.test(b.textContent))b.textContent='Accounting'});
    window.renderAccounts=function(){normalizeAccounts(); const rows=accountRows(); const total=rows.reduce((s,a)=>s+Number(a.balance||0),0); const main=document.getElementById('mainCard'); if(!main)return; main.innerHTML='<div class="table-toolbar"><div class="tools"><button class="btn primary" onclick="openAccountForm()">+ Add Account</button><input id="searchBox" class="search" placeholder="Search..." oninput="renderAccounts()"></div><div class="tools"><button class="btn ghost small" onclick="exportCSV()">Export CSV</button><button class="btn ghost small" onclick="window.print()">Print</button></div></div><div class="table-wrap"><table class="data-table"><thead><tr><th>Account Name</th><th>Account Type</th><th>Account No.</th><th>Balance</th><th>Note</th><th>Created By</th><th>Actions</th></tr></thead><tbody>'+rows.map(a=>'<tr><td><b>'+e(tr(a.name))+'</b><br><span class="status '+((a.active==='Inactive'||a.active==='غير نشط')?'bad':'ok')+'">'+e(tr(a.active||'Active'))+'</span></td><td>'+e(tr(a.type))+'</td><td>'+e(a.code||'')+'</td><td>'+moneyFn(a.balance)+'</td><td>'+e(tr(a.note))+'</td><td>'+e(a.createdBy||'')+'</td><td>'+accountingActions(a.id)+'</td></tr>').join('')+'</tbody><tfoot><tr><td colspan="3">Total</td><td>'+moneyFn(total)+'</td><td colspan="3"></td></tr></tfoot></table></div>'; modernizeFields(main);};
    window.openAccountForm=function(id=''){normalizeAccounts(); const a=accountBy(id); const modal=document.getElementById('modalBack'), titleEl=document.getElementById('modalTitle'), body=document.getElementById('modalBody'); if(!body||!modal)return; if(titleEl)titleEl.textContent=id?'Edit Account':'Add New Account'; body.innerHTML='<form id="accForm" class="grid"><input type="hidden" name="id" value="'+e(id)+'"><div class="field"><label>Account Name</label><input name="name" value="'+e(tr(a.name))+'" required></div><div class="field"><label>Account No.</label><input name="code" value="'+e(a.code||'')+'"></div><div class="field"><label>Account Type</label><select name="type">'+['Current Assets','Current Liabilities','Equity','Expenses','Revenue'].map(x=>'<option '+(tr(a.type)===x?'selected':'')+'>'+x+'</option>').join('')+'</select></div><div class="field"><label>Opening Balance</label><input name="openingBalance" type="number" value="'+e(a.openingBalance||0)+'"></div><div class="field"><label>Status</label><select name="active"><option '+(tr(a.active)==='Active'?'selected':'')+'>Active</option><option '+(tr(a.active)==='Inactive'?'selected':'')+'>Inactive</option></select></div><div class="field" style="grid-column:1/-1"><label>Note</label><textarea name="note">'+e(tr(a.note))+'</textarea></div></form>'; modal.style.display='flex'; setTimeout(()=>modernizeFields(modal),0)};
    const oldSave=window.saveAccount; window.saveAccount=function(){const f=document.getElementById('accForm'); if(!f)return oldSave&&oldSave(); let data=Object.fromEntries(new FormData(f).entries()); try{let rows=collection('accounts'); if(data.id){let i=rows.findIndex(x=>x.id===data.id); if(i>=0)rows[i]={...rows[i],...data,balance:Number(rows[i].balance||0)};}else{data.id=(window.uid?uid('acc'):'acc-'+Date.now()); data.balance=Number(data.openingBalance||0); data.createdBy=(window.currentUser?currentUser().name:'Admin'); rows.unshift(data); if(data.balance&&window.addMovement)addMovement(data.id,'in',data.balance,'Opening Balance','Account Created');} if(window.persist)persist(); if(window.closeModal)closeModal(); if(window.renderAccounts)renderAccounts(); if(window.toast)toast('Account saved');}catch(err){console.warn(err)}};
    window.quickMovement=function(accountId,type){let amount=Number(prompt(type==='in'?'Deposit amount':'Withdrawal amount')||0); if(amount>0){if(window.addMovement)addMovement(accountId,type,amount,type==='in'?'Manual Deposit':'Manual Withdrawal','Account Management'); if(window.persist)persist(); if(window.renderAccounts)renderAccounts();}};
    window.renderTransfer=function(){normalizeAccounts(); const main=document.getElementById('mainCard'); if(!main)return; main.innerHTML='<div class="grid"><div class="field"><label>From Account</label><select id="fromAccount">'+accountOptions()+'</select></div><div class="field"><label>To Account</label><select id="toAccount">'+accountOptions()+'</select></div><div class="field"><label>Amount</label><input id="amount" type="number"></div><div class="field"><label>Note</label><input id="note"></div></div><div class="tools" style="justify-content:center;margin-top:14px"><button class="btn purple" onclick="saveTransfer()">Save Transfer</button></div>'; modernizeFields(main)};
    window.saveTransfer=function(){let from=document.getElementById('fromAccount')?.value,to=document.getElementById('toAccount')?.value,amount=Number(document.getElementById('amount')?.value||0); if(!from||!to||!amount)return window.toast&&toast('Complete the transfer data'); if(window.addMovement){addMovement(from,'out',amount,'Transfer',document.getElementById('note')?.value||'');addMovement(to,'in',amount,'Transfer',document.getElementById('note')?.value||'')} try{collection('accountTransfers').unshift({id:window.uid?uid('tr'):'tr-'+Date.now(),date:window.nowText?nowText():new Date().toISOString(),fromAccount:tr(accountBy(from).name),toAccount:tr(accountBy(to).name),amount,note:document.getElementById('note')?.value||'',createdBy:window.currentUser?currentUser().name:'Admin'}); if(window.persist)persist(); if(window.toast)toast('Transfer saved'); renderTransfer();}catch(err){console.warn(err)}};
    window.renderAccountsEnglishReport=function(){const rows=(window.collection?collection('accountMovements'):[]).filter(x=>!x._deleted); const main=document.getElementById('mainCard'); if(!main)return; const cols=['date','accountName','type','amount','balanceBefore','balanceAfter','source','note','createdBy']; const heads=['Date','Account','Type','Amount','Balance Before','Balance After','Source','Note','Created By']; main.innerHTML='<div class="table-toolbar"><div class="tools"><input id="searchBox" class="search" placeholder="Search..." oninput="renderAccountsEnglishReport()"></div><div class="tools"><button class="btn ghost small" onclick="exportCSV&&exportCSV()">Export CSV</button><button class="btn ghost small" onclick="window.print()">Print</button></div></div><div class="table-wrap"><table class="data-table"><thead><tr>'+heads.map(h=>'<th>'+h+'</th>').join('')+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+cols.map(c=>{let v=r[c]; if(['amount','balanceBefore','balanceAfter'].includes(c))v=moneyFn(v); else v=tr(v); return '<td>'+e(v)+'</td>'}).join('')+'</tr>').join('')+'</tbody></table></div>'; modernizeFields(main)};
    const oldReports=window.renderReportsGeneric; window.renderReportsGeneric=function(){if(window.CFG&&(CFG.kind==='accounts_report'||CFG.collection==='accountMovements'))return renderAccountsEnglishReport(); return oldReports&&oldReports.apply(this,arguments)};
    if(!document.body.dataset.r25AccountingRendered){document.body.dataset.r25AccountingRendered='1'; setTimeout(()=>{try{if(window.CFG&&CFG.kind==='accounts')renderAccounts(); else if(window.CFG&&CFG.kind==='transfer')renderTransfer(); else if(window.CFG&&(CFG.kind==='accounts_report'||CFG.collection==='accountMovements'))renderAccountsEnglishReport();}catch(err){console.warn(err)}},0);}
  }
  const oldRender=window.renderPage; if(oldRender&&!oldRender.__r25){window.renderPage=function(){const r=oldRender.apply(this,arguments); setTimeout(run,0); return r}; window.renderPage.__r25=true;}
  function run(){patchSyncNow(); updateSyncBadge(); modernizeFields(); polishInvoiceButtons(); patchAccounting();}
  document.addEventListener('click',function(ev){const b=ev.target.closest('[data-r19-inv]'); if(!b)return; const act=b.dataset.r19Inv,id=b.dataset.id; if(act==='image'&&window.downloadInvoiceImage)return downloadInvoiceImage(id); if(act==='delete'&&window.deleteInvoice)return deleteInvoice(id); if(act==='edit'&&window.editInvoice)return editInvoice(id);},true);
  const mo=new MutationObserver(()=>{clearTimeout(window.__r25tick); window.__r25tick=setTimeout(run,70)});
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',()=>{run(); try{mo.observe(document.documentElement,{childList:true,subtree:true})}catch(_){}}); else {run(); try{mo.observe(document.documentElement,{childList:true,subtree:true})}catch(_){}}
  [120,500,1200,2500].forEach(t=>setTimeout(run,t));
})();
